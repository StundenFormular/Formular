<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal deaktiviert</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  overflow:hidden;
}

/* ===== Hintergrund Animation ===== */
.errorPage{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(270deg, #4f46e5, #06b6d4, #9333ea);
  background-size: 600% 600%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== Glow Blobs ===== */
.errorPage::before,
.errorPage::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.5;
}

.errorPage::before{
  background:#4f46e5;
  top:10%;
  left:10%;
  animation: float1 8s ease-in-out infinite;
}

.errorPage::after{
  background:#06b6d4;
  bottom:10%;
  right:10%;
  animation: float2 10s ease-in-out infinite;
}

@keyframes float1{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(50px,-50px);}
}

@keyframes float2{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(-50px,50px);}
}

/* ===== Karte ===== */
.errorCard{
  position:relative;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(18px);
  border-radius:24px;
  padding:45px 30px;
  text-align:center;
  max-width:420px;
  color:#fff;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
  animation: floatCard 6s ease-in-out infinite;
}

/* Glow Border */
.errorCard::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:24px;
  background:linear-gradient(135deg,#4f46e5,#06b6d4,#9333ea);
  z-index:-1;
  filter:blur(10px);
  opacity:0.7;
}

@keyframes floatCard{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* ===== Icon ===== */
.icon{
  font-size:65px;
  margin-bottom:10px;
  animation: pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.2);}
}

/* ===== Titel ===== */
.errorCard h1{
  margin:10px 0;
  font-size:28px;
  letter-spacing:0.5px;
}

/* ===== Text ===== */
.errorCard p{
  font-size:15px;
  line-height:1.6;
  color:rgba(255,255,255,.85);
}

/* ===== Button ===== */
.errorCard button{
  margin-top:22px;
  padding:12px 22px;
  border:none;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  color:#fff;
  transition:0.25s;
  box-shadow:0 0 15px rgba(79,70,229,.6);
}

.errorCard button:hover{
  transform:scale(1.08);
  box-shadow:0 0 30px rgba(6,182,212,.9);
}
</style>
</head>

<body>

<div class="errorPage">
  <div class="errorCard">
    <div class="icon">⚠️</div>

    <h1>Portal deaktiviert</h1>

    <p>
      Dieses Portal wurde vom Administrator deaktiviert.<br><br>
      Bitte nutzen Sie eine alternative Lösung oder wenden Sie sich an Ihren Vorgesetzten.
    </p>

    <button onclick="location.reload()">Seite neu laden</button>
  </div>
</div>

</body>
</html>
